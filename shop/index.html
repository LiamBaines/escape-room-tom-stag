<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Escape Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F2EE;
      --surface: #FFFFFF;
      --border: #E2DDD6;
      --text-primary: #1A1714;
      --text-secondary: #6B6560;
      --text-muted: #9E9890;
      --accent: #2C5F2E;
      --accent-light: #EAF2EA;
      --accent-hover: #1E4320;
      --danger: #B03020;
      --danger-light: #FAEFED;
      --gold: #C9913A;
      --sidebar-width: 210px;
      --basket-width: 300px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ── */
    header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 28px;
      height: 64px;
      background: #1A1714;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #2E2924;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: #1A1714;
      font-weight: 700;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 600;
      color: #FFFFFF;
      letter-spacing: 0.01em;
    }

    .logo-sub {
      font-size: 10px;
      font-weight: 300;
      color: #888179;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      display: block;
      margin-top: -2px;
    }

    .search-wrap {
      position: relative;
      width: 380px;
    }

    .search-wrap svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      opacity: 0.5;
    }

    #searchBar {
      width: 100%;
      padding: 9px 14px 9px 38px;
      border-radius: 8px;
      border: 1px solid #3A3530;
      background: #252118;
      color: #FFFFFF;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    #searchBar::placeholder { color: #666057; }
    #searchBar:focus { border-color: var(--gold); background: #2E2924; }

    .header-right {
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .profile-badge {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .profile-name {
      font-size: 13px;
      font-weight: 500;
      color: #D6D0C8;
    }

    .profile-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 2px solid #3A3530;
      background: #2E2924;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--gold);
      overflow: hidden;
      flex-shrink: 0;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Layout ── */
    .container {
      display: flex;
      min-height: calc(100vh - 64px);
    }

    /* ── Sidebar ── */
    #leftbar {
      width: var(--sidebar-width);
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 16px;
      position: sticky;
      top: 64px;
      height: calc(100vh - 64px);
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
      padding-left: 10px;
    }

    .dept-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
      transition: background 0.15s, color 0.15s;
      margin-bottom: 2px;
    }

    .dept-item:hover { background: var(--bg); color: var(--text-primary); }

    .dept-item.active {
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 500;
    }

    .dept-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    .sidebar-promo {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      margin-top: 8px;
    }

    .sidebar-promo .promo-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 5px;
    }

    .sidebar-promo p {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* ── Products ── */
    #products {
      flex: 1;
      padding: 28px 24px;
      min-width: 0;
    }

    .products-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .products-title {
      font-size: 20px;
      font-weight: 600;
    }

    .products-count {
      font-size: 12px;
      color: var(--text-muted);
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }

    .product {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s, transform 0.2s;
      position: relative;
    }

    .product:hover {
      box-shadow: 0 6px 24px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }

    /* White background for image area — seamless with product card */
    .product-img-wrap {
      position: relative;
      padding-top: 68%;
      background: #FFFFFF;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }

    .product-img-wrap img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 12px;
      transition: transform 0.3s;
    }

    .product:hover .product-img-wrap img { transform: scale(1.04); }

    .in-basket-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--accent);
      color: white;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .in-basket-badge.show { display: flex; }
    .in-basket-badge svg { width: 11px; height: 11px; }

    .product-body {
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .product-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .product-price {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
      margin-top: auto;
      padding-top: 8px;
    }

    .product-price span {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      width: 100%;
    }

    .btn-add { background: var(--accent); color: white; }
    .btn-add:hover { background: var(--accent-hover); }
    .btn-remove { background: var(--danger-light); color: var(--danger); }
    .btn-remove:hover { background: #f5dbd7; }

    /* ── Basket ── */
    #basket {
      width: var(--basket-width);
      background: var(--surface);
      border-left: 1px solid var(--border);
      position: sticky;
      top: 64px;
      height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .basket-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .basket-title { font-size: 16px; font-weight: 600; }

    .basket-clear {
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      transition: color 0.15s;
      padding: 4px 0;
    }

    .basket-clear:hover { color: var(--danger); }

    #basketItems {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    #basketItems::-webkit-scrollbar { width: 4px; }
    #basketItems::-webkit-scrollbar-track { background: transparent; }
    #basketItems::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .basket-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 40px 20px;
      text-align: center;
      color: var(--text-muted);
    }

    .basket-empty svg { opacity: 0.2; margin-bottom: 12px; }
    .basket-empty p { font-size: 13px; line-height: 1.5; }

    .basket-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      transition: background 0.12s;
    }

    .basket-item:hover { background: var(--bg); }

    /* White bg on basket thumbnails to match product cards */
    .basket-item-img {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      background: #FFFFFF;
      border: 1px solid var(--border);
      object-fit: contain;
      padding: 4px;
      flex-shrink: 0;
    }

    .basket-item-info { flex: 1; min-width: 0; }

    .basket-item-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .basket-item-price {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 1px;
    }

    .basket-item-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      display: flex;
      align-items: center;
    }

    .basket-item-remove:hover { color: var(--danger); background: var(--danger-light); }

    .basket-footer {
      border-top: 1px solid var(--border);
      padding: 20px;
    }

    .basket-subtotals { margin-bottom: 0; }

    .subtotal-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .subtotal-row.total {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      margin-bottom: 0;
    }

    .checkout-btn {
      width: 100%;
      padding: 12px;
      border-radius: 9px;
      border: none;
      background: #1A1714;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
    }

    .checkout-btn:hover:not(:disabled) { background: #2E2924; }

    .checkout-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,23,20,0.6);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 18px;
      padding: 44px 48px 40px;
      max-width: 340px;
      width: 90%;
      text-align: center;
      position: relative;
      animation: modal-in 0.22s cubic-bezier(0.34, 1.3, 0.64, 1);
    }

    @keyframes modal-in {
      from { opacity: 0; transform: scale(0.92) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 6px;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
    }

    .modal-close:hover { background: var(--bg); color: var(--text-primary); }

    .modal-icon {
      width: 60px;
      height: 60px;
      background: var(--accent-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 22px;
    }

    .modal-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .modal-total {
      font-size: 48px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .modal-sub {
      margin-top: 14px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* ── No results ── */
    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .no-results h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>

<header>
    <a class="logo" href="#">
        <div class="logo-mark">E</div>
        <div>
            <span class="logo-text">Escape</span>
            <span class="logo-sub">Fine Grocer</span>
        </div>
    </a>

    <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <circle cx="6.5" cy="6.5" r="5.5" stroke="white" stroke-width="1.5"/>
            <path d="M11 11L14.5 14.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input id="searchBar" placeholder="Search products…" autocomplete="off"/>
    </div>

    <div class="header-right">
        <div class="profile-badge">
            <span class="profile-name">Tom</span>
            <div class="profile-avatar" id="profileAvatar">
                <img src="https://scontent-lhr6-1.xx.fbcdn.net/v/t1.6435-9/36520871_10205352252922505_6936644930643165184_n.jpg?_nc_cat=110&ccb=1-7&_nc_sid=1d70fc&_nc_ohc=OQuqrx1qQkIQ7kNvwFNLB9t&_nc_oc=AdryVXhFbsMpvB7CxbIRsQA1T-OBVu86lEe7A7ZEmobWIJXEaptDPwjVvv_7yofREpo&_nc_zt=23&_nc_ht=scontent-lhr6-1.xx&_nc_gid=_9dxIGoRXKhNZ4CbMOg0yA&_nc_ss=7b2a8&oh=00_Af7uBf7hVPXjm2U0XptbtiLfRk-4UcPoU16UMgOEuyghPA&oe=6A25B1A7" alt="Tom" />
            </div>
        </div>
    </div>
</header>

<div class="container">

    <!-- Sidebar -->
    <div id="leftbar">
        <div class="sidebar-section-label">Browse</div>
        <div id="deptList"></div>

        <div class="sidebar-divider"></div>

        <div class="sidebar-promo">
            <div class="promo-label">This week</div>
            <p>Build the perfect basket and unlock massive savings!</p>
        </div>
    </div>

    <!-- Products -->
    <div id="products">
        <div class="products-header">
            <h1 class="products-title" id="productsTitle">All Products</h1>
            <span class="products-count" id="productsCount">0 items</span>
        </div>
        <div class="product-grid" id="productGrid"></div>
    </div>

    <!-- Basket -->
    <div id="basket">
        <div class="basket-header">
            <h2 class="basket-title">Your Basket</h2>
            <button class="basket-clear" onclick="clearBasket()">Clear all</button>
        </div>

        <div id="basketItems"></div>

        <div class="basket-footer">
            <div class="basket-subtotals">
                <div class="subtotal-row">
                    <span>Subtotal</span>
                    <span id="subtotalVal">£0.00</span>
                </div>
                <div class="subtotal-row">
                    <span>Delivery</span>
                    <span style="color:#4A9E6B">Free</span>
                </div>
                <div class="subtotal-row total">
                    <span>Total</span>
                    <span id="totalVal">£0.00</span>
                </div>
            </div>

            <button class="checkout-btn" id="checkoutBtn" disabled onclick="openModal()">
                Proceed to Checkout
                <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
                    <path d="M3 8h10M9 4l4 4-4 4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>

</div>

<!-- Checkout Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
    <div class="modal">
        <button class="modal-close" onclick="closeModal()">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
        </button>
        <div class="modal-icon">
            <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
                <path d="M5 13l6 6L21 7" stroke="#2C5F2E" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div class="modal-label">Your Total</div>
        <div class="modal-total" id="modalTotal">£0.00</div>
        <p class="modal-sub">Your basket is confirmed and ready to go.</p>
    </div>
</div>

<script>
/* ── CSV with categories ── */
const csv = `item,correct?,category,link
Edam,,dairy,"https://m.media-amazon.com/images/I/61RHD4Oo0YL._AC_UF894,1000_QL80_.jpg"
Irn bru,y,drinks,https://m.media-amazon.com/images/I/818xGCFb-XL.jpg
MSG,y,condiments,"https://m.media-amazon.com/images/I/713CkQj0gZL._AC_UF894,1000_QL80_.jpg"
Stella Artois,y,alcohol,"https://m.media-amazon.com/images/I/91ml4pVp9UL._AC_UF894,1000_QL80_.jpg"
Vinegar,y,condiments,"https://m.media-amazon.com/images/I/61NDzSp-KmL._AC_UF894,1000_QL80_.jpg"
Vodka,y,alcohol,https://m.media-amazon.com/images/I/81FKarg+VTL.jpg
Wasabi,y,condiments,https://m.media-amazon.com/images/I/81-W5-WbcfL.jpg
Whey powder,y,supplements,"https://m.media-amazon.com/images/I/71GewZD6LuL._AC_UF1000,1000_QL80_.jpg"
Worcestershire sauce,y,condiments,https://m.media-amazon.com/images/I/71nYgwYxLnL.jpg`;

const CATEGORY_COLORS = {
  all:         '#C9913A',
  drinks:      '#5B9BD5',
  condiments:  '#E07B39',
  alcohol:     '#8B4A8C',
  dairy:       '#4A9E6B',
  supplements: '#D4AD47',
};

function parseCSV(text) {
  const lines = text.trim().split('\n').slice(1);
  return lines.map(l => {
    const parts = l.split(',');
    return {
      name:     parts[0].trim(),
      correct:  parts[1].trim().toLowerCase() === 'y',
      category: parts[2].trim().toLowerCase(),
      img:      parts.slice(3).join(',').replace(/"/g, '').trim()
    };
  });
}

let products = parseCSV(csv);
products.sort((a, b) => a.name.localeCompare(b.name));
products.forEach(p => { p.price = +(Math.random() * 9 + 1.5).toFixed(2); });

const targetTotal = products.filter(p => p.correct).reduce((s, p) => s + p.price, 0);

let basket = new Set();
let activeCategory = 'all';

/* ── DOM ── */
const grid          = document.getElementById('productGrid');
const basketItemsEl = document.getElementById('basketItems');
const totalVal      = document.getElementById('totalVal');
const subtotalVal   = document.getElementById('subtotalVal');
const productsCount = document.getElementById('productsCount');
const productsTitle = document.getElementById('productsTitle');
const checkoutBtn   = document.getElementById('checkoutBtn');
const modalOverlay  = document.getElementById('modalOverlay');
const modalTotal    = document.getElementById('modalTotal');
const deptList      = document.getElementById('deptList');

/* ── Build sidebar ── */
const allCats = ['all', ...new Set(products.map(p => p.category))];

allCats.forEach(cat => {
  const label = cat === 'all' ? 'All Items' : cap(cat);
  const color = CATEGORY_COLORS[cat] || '#9E9890';
  const el = document.createElement('div');
  el.className = 'dept-item' + (cat === 'all' ? ' active' : '');
  el.dataset.cat = cat;
  el.innerHTML = `<span class="dept-dot" style="background:${color}"></span>${label}`;
  el.addEventListener('click', () => {
    document.querySelectorAll('.dept-item').forEach(d => d.classList.remove('active'));
    el.classList.add('active');
    activeCategory = cat;
    productsTitle.textContent = cat === 'all' ? 'All Products' : cap(cat);
    renderProducts(getFiltered());
  });
  deptList.appendChild(el);
});

function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function getFiltered() {
  const q = document.getElementById('searchBar').value.toLowerCase();
  return products.filter(p =>
    (activeCategory === 'all' || p.category === activeCategory) &&
    p.name.toLowerCase().includes(q)
  );
}

/* ── Render products ── */
function renderProducts(list) {
  productsCount.textContent = `${list.length} item${list.length !== 1 ? 's' : ''}`;
  grid.innerHTML = '';

  if (!list.length) {
    grid.innerHTML = `<div class="no-results"><h3>No results</h3><p>Try a different search or category.</p></div>`;
    return;
  }

  list.forEach(p => {
    const inBasket = basket.has(p.name);
    const el = document.createElement('div');
    el.className = 'product';
    el.innerHTML = `
      <div class="product-img-wrap">
        <img src="${p.img}" alt="${p.name}" loading="lazy"/>
        <div class="in-basket-badge ${inBasket ? 'show' : ''}">
          <svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="product-body">
        <div class="product-name">${p.name}</div>
        <div class="product-price">£${p.price.toFixed(2)} <span>/ unit</span></div>
        <button class="btn ${inBasket ? 'btn-remove' : 'btn-add'}" onclick="toggle('${p.name}')">
          ${inBasket
            ? `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Remove`
            : `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg> Add to Basket`
          }
        </button>
      </div>
    `;
    grid.appendChild(el);
  });
}

/* ── Render basket ── */
function renderBasket() {
  basketItemsEl.innerHTML = '';
  const items = [...basket].map(n => products.find(p => p.name === n)).sort((a, b) => a.name.localeCompare(b.name));

  if (!items.length) {
    basketItemsEl.innerHTML = `
      <div class="basket-empty">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="8" y="16" width="32" height="26" rx="3" stroke="#9E9890" stroke-width="2"/>
          <path d="M16 16v-4a8 8 0 0116 0v4" stroke="#9E9890" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <p>Your basket is empty.<br/>Add items to get started.</p>
      </div>
    `;
    totalVal.textContent    = '£0.00';
    subtotalVal.textContent = '£0.00';
    checkoutBtn.disabled    = true;
    return;
  }

  let total = 0;
  items.forEach(p => {
    total += p.price;
    const row = document.createElement('div');
    row.className = 'basket-item';
    row.innerHTML = `
      <img class="basket-item-img" src="${p.img}" alt="${p.name}" loading="lazy"/>
      <div class="basket-item-info">
        <div class="basket-item-name">${p.name}</div>
        <div class="basket-item-price">£${p.price.toFixed(2)}</div>
      </div>
      <button class="basket-item-remove" onclick="toggle('${p.name}')" title="Remove">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <path d="M2 2l9 9M11 2l-9 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    `;
    basketItemsEl.appendChild(row);
  });

  totalVal.textContent    = `£${total.toFixed(2)}`;
  subtotalVal.textContent = `£${total.toFixed(2)}`;
  checkoutBtn.disabled    = Math.abs(total - targetTotal) >= 0.01;
}

function render() {
  renderProducts(getFiltered());
  renderBasket();
}

function toggle(name) {
  basket.has(name) ? basket.delete(name) : basket.add(name);
  render();
}

function clearBasket() {
  basket.clear();
  render();
}

/* ── Modal ── */
function openModal() {
  const total = [...basket].map(n => products.find(p => p.name === n)).reduce((s, p) => s + p.price, 0);
  modalTotal.textContent = `£${total.toFixed(2)}`;
  modalOverlay.classList.add('open');
}

function closeModal() { modalOverlay.classList.remove('open'); }
function closeModalOnOverlay(e) { if (e.target === modalOverlay) closeModal(); }

/* ── Search ── */
document.getElementById('searchBar').addEventListener('input', () => renderProducts(getFiltered()));

render();
</script>
</body>
</html>
